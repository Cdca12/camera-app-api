name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Build CameraAppAPI.exe
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm CameraAppAPI.spec

      - name: Create artifact zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Compress-Archive -Path dist\CameraAppAPI\* -DestinationPath artifact\CameraAppAPI-windows.zip -Force

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CameraAppAPI-windows
          path: artifact/CameraAppAPI-windows.zip
          if-no-files-found: error
          retention-days: 14
